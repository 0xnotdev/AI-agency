<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadRecover — Operator Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Base Colors */
            --bg-base: #0a0a0f;
            --bg-surface: rgba(20, 20, 30, 0.7);
            --bg-surface-hover: rgba(30, 30, 45, 0.9);
            --bg-surface-active: rgba(45, 45, 70, 0.9);
            
            /* Accents */
            --accent-primary: #5b4cf5;
            --accent-secondary: #00d2ff;
            --accent-danger: #e11d48;
            
            /* Text */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            
            /* Badges */
            --badge-green-bg: rgba(16, 185, 129, 0.15);
            --badge-green-text: #34d399;
            --badge-green-border: rgba(16, 185, 129, 0.3);
            
            --badge-blue-bg: rgba(59, 130, 246, 0.15);
            --badge-blue-text: #60a5fa;
            --badge-blue-border: rgba(59, 130, 246, 0.3);
            
            --badge-purple-bg: rgba(139, 92, 246, 0.15);
            --badge-purple-text: #c084fc;
            --badge-purple-border: rgba(139, 92, 246, 0.3);
            
            --badge-red-bg: rgba(239, 68, 68, 0.15);
            --badge-red-text: #f87171;
            --badge-red-border: rgba(239, 68, 68, 0.3);
            
            --badge-yellow-bg: rgba(245, 158, 11, 0.15);
            --badge-yellow-text: #fbbf24;
            --badge-yellow-border: rgba(245, 158, 11, 0.3);
            
            --badge-gray-bg: rgba(100, 116, 139, 0.15);
            --badge-gray-text: #94a3b8;
            --badge-gray-border: rgba(100, 116, 139, 0.3);

            /* Borders */
            --border-light: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem 4rem;
        }

        /* Utility */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .justify-between { justify-content: space-between; }
        .items-center { align-items: center; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mt-2 { margin-top: 0.5rem; }
        .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Typography */
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .title {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Glassmorphic Cards */
        .card {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            border-top: 1px solid var(--border-highlight);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent-primary);
            color: #fff;
            box-shadow: 0 2px 10px rgba(91, 76, 245, 0.3);
        }
        .btn-primary:hover {
            background: #4b3bdf;
            transform: translateY(-1px);
        }
        .btn-danger {
            background: var(--accent-danger);
            color: #fff;
            box-shadow: 0 2px 10px rgba(225, 29, 72, 0.3);
        }
        .btn-danger:hover {
            background: #be123c;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.2);
            padding: 0.3rem;
            border-radius: 10px;
            width: fit-content;
            border: 1px solid var(--border-light);
        }
        .tab-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active {
            background: var(--bg-surface-active);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Forms & Inputs */
        input, select, textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(91, 76, 245, 0.2);
        }
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Tables */
        .table-wrapper {
            background: var(--bg-surface);
            border-radius: 12px;
            border: 1px solid var(--border-light);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.4s ease-out;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-light);
        }
        td {
            padding: 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-primary);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .link {
            color: var(--accent-secondary);
            text-decoration: none;
        }
        .link:hover { text-decoration: underline; }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid;
            white-space: nowrap;
        }
        .badge-green { background: var(--badge-green-bg); color: var(--badge-green-text); border-color: var(--badge-green-border); }
        .badge-blue { background: var(--badge-blue-bg); color: var(--badge-blue-text); border-color: var(--badge-blue-border); }
        .badge-purple { background: var(--badge-purple-bg); color: var(--badge-purple-text); border-color: var(--badge-purple-border); }
        .badge-red { background: var(--badge-red-bg); color: var(--badge-red-text); border-color: var(--badge-red-border); }
        .badge-yellow { background: var(--badge-yellow-bg); color: var(--badge-yellow-text); border-color: var(--badge-yellow-border); }
        .badge-gray { background: var(--badge-gray-bg); color: var(--badge-gray-text); border-color: var(--badge-gray-border); }

        /* Modals */
        .modal-backdrop {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-backdrop.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #101018;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-backdrop.show .modal-content { transform: translateY(0); }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-close {
            background: none; border: none;
            color: var(--text-tertiary);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover { color: #fff; }
        
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

        /* Conversations (Operator View) */
        .conv-item {
            cursor: pointer;
            padding: 1.25rem;
            margin-bottom: 0.75rem;
            display: flex;
            flex-direction: column;
        }
        .conv-item:hover {
            border-color: rgba(91, 76, 245, 0.4);
            transform: translateY(-2px);
        }
        .conv-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .conv-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .thread-container {
            margin: 1rem 0 2rem 2rem;
            padding-left: 1.5rem;
            border-left: 2px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeIn 0.3s;
        }
        .chat-bubble {
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            max-width: 80%;
            line-height: 1.5;
        }
        .chat-inbound { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-outbound { background: rgba(91,76,245,0.15); align-self: flex-end; border-bottom-right-radius: 2px; }
        .handoff-banner {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(180, 83, 9, 0.2));
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Loading */
        .loading { display: flex; justify-content: center; padding: 3rem; }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="title">LeadRecover</h1>
                <p class="subtitle mt-1">Operator Dashboard</p>
            </div>
            <div class="subtitle" style="font-size: 0.7rem;">v1.0 — Internal Access</div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button onclick="switchTab('clients')" id="tab-clients" class="tab-btn active">Clients</button>
            <button onclick="switchTab('leads')" id="tab-leads" class="tab-btn">Leads</button>
            <button onclick="switchTab('conversations')" id="tab-conversations" class="tab-btn">Conversations</button>
            <button onclick="switchTab('events')" id="tab-events" class="tab-btn">Events / Audit</button>
        </div>

        <!-- Content Areas -->
        <div id="content-clients" class="fade-in"></div>
        <div id="content-leads" class="hidden fade-in"></div>
        <div id="content-conversations" class="hidden fade-in"></div>
        <div id="content-events" class="hidden fade-in"></div>
    </div>

    <!-- Config Modal -->
    <div id="config-modal" class="modal-backdrop">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="title" style="font-size: 1.5rem;" id="modal-title">Edit Client Config</h3>
                <button onclick="closeModal()" class="modal-close">&times;</button>
            </div>
            <form id="config-form" onsubmit="saveConfig(event)">
                <input type="hidden" id="edit-client-id">
                
                <div class="grid-form">
                    <div class="form-group">
                        <label class="form-label">Business Name</label>
                        <input id="edit-business_name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Niche</label>
                        <input id="edit-niche">
                    </div>
                    <div class="form-group">
                        <label class="form-label">WhatsApp Phone ID</label>
                        <input id="edit-whatsapp_phone_number_id">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Inbound Email</label>
                        <input id="edit-inbound_email_address">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Booking Link</label>
                        <input id="edit-booking_link">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tone Instructions</label>
                        <input id="edit-tone_instructions">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Outbound Offer</label>
                    <textarea id="edit-outbound_offer" rows="2"></textarea>
                </div>
                
                <div class="grid-form">
                    <div class="form-group">
                        <label class="form-label">Services (JSON)</label>
                        <textarea id="edit-services" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">FAQ (JSON)</label>
                        <textarea id="edit-faq" rows="4"></textarea>
                    </div>
                </div>
                
                <div class="flex gap-2" style="justify-content: flex-end; margin-top: 1rem;">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Auth is handled via browser Basic Auth for same-origin requests.
        let allClients = [];
        let currentTab = 'clients';

        async function api(path, options = {}) {
            const resp = await fetch(path, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers },
                credentials: 'same-origin'
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({ detail: resp.statusText }));
                throw new Error(err.detail || resp.statusText);
            }
            return resp.json();
        }

        function switchTab(tab) {
            currentTab = tab;
            ['clients', 'leads', 'conversations', 'events'].forEach(t => {
                const el = document.getElementById('content-' + t);
                const btn = document.getElementById('tab-' + t);
                if (t === tab) {
                    el.classList.remove('hidden');
                    btn.classList.add('active');
                } else {
                    el.classList.add('hidden');
                    btn.classList.remove('active');
                }
            });
            if (tab === 'clients') loadClients();
            if (tab === 'leads') renderLeadsTab();
            if (tab === 'conversations') renderConversationsTab();
            if (tab === 'events') renderEventsTab();
        }

        // Status-to-color mapping
        function getBadge(value, type='status') {
            const v = (value || 'unknown').toLowerCase();
            let color = 'gray';
            if (['active', 'booked', 'replied'].includes(v)) color = 'green';
            else if (['new', 'inbound'].includes(v)) color = 'blue';
            else if (['contacted', 'outbound'].includes(v)) color = 'purple';
            else if (['dead', 'error'].includes(v)) color = 'red';
            else if (['paused', 'handed_off'].includes(v)) color = 'yellow';
            
            return `<span class="badge badge-${color}">${value || 'unknown'}</span>`;
        }

        function getLoading() {
            return '<div class="loading"><div class="spinner"></div></div>';
        }

        function formatDate(d) {
            if (!d) return '—';
            return new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function clientDropdown(selectedId, onchangeHandler) {
            let opts = '<option value="">Select a client...</option>';
            allClients.forEach(c => {
                opts += `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${c.business_name} (${c.status})</option>`;
            });
            return `
                <div class="form-group" style="max-width: 300px; margin-bottom: 0;">
                    <select onchange="${onchangeHandler}">${opts}</select>
                </div>`;
        }

        // ---------- Tab 1: Clients ----------
        async function loadClients() {
            const el = document.getElementById('content-clients');
            el.innerHTML = getLoading();
            try {
                const data = await api('/admin/clients');
                allClients = data.clients;
                
                if (!allClients.length) {
                    el.innerHTML = '<div class="card"><p style="color: var(--text-tertiary)">No clients found.</p></div>';
                    return;
                }
                
                let html = `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Business Name</th>
                                <th>Niche</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Dashboard Token</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>`;
                
                allClients.forEach(c => {
                    const token = c.dashboard_token || '—';
                    const tokenLink = c.dashboard_token ? `<a href="/client/${c.dashboard_token}" target="_blank" class="link">${token.substring(0, 8)}…</a>` : '—';
                    html += `
                        <tr>
                            <td style="font-weight: 500;">${c.business_name}</td>
                            <td style="color: var(--text-secondary)">${c.niche || '—'}</td>
                            <td>${getBadge(c.status)}</td>
                            <td style="color: var(--text-tertiary); font-size: 0.8rem;">${formatDate(c.created_at)}</td>
                            <td>${tokenLink}</td>
                            <td class="flex gap-2 items-center">
                                <button onclick="toggleStatus('${c.id}', '${c.status}')" class="btn ${c.status === 'active' ? 'btn-danger' : 'btn-primary'}">
                                    ${c.status === 'active' ? 'Pause' : 'Activate'}
                                </button>
                                <button onclick="editConfig('${c.id}')" class="btn btn-secondary">Edit</button>
                            </td>
                        </tr>`;
                });
                html += `</tbody></table></div>`;
                el.innerHTML = html;
            } catch (e) {
                el.innerHTML = `<div class="card"><p style="color: var(--accent-danger)">Error: ${e.message}</p></div>`;
            }
        }

        async function toggleStatus(clientId, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'paused' : 'active';
            try {
                await api(`/admin/clients/${clientId}/status`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: newStatus })
                });
                loadClients();
            } catch (e) { alert('Error: ' + e.message); }
        }

        function editConfig(clientId) {
            const client = allClients.find(c => c.id === clientId);
            if (!client) return;
            const cfg = client.config || {};
            document.getElementById('edit-client-id').value = clientId;
            document.getElementById('edit-business_name').value = client.business_name || '';
            document.getElementById('edit-niche').value = client.niche || '';
            document.getElementById('edit-whatsapp_phone_number_id').value = cfg.whatsapp_phone_number_id || '';
            document.getElementById('edit-inbound_email_address').value = cfg.inbound_email_address || '';
            document.getElementById('edit-booking_link').value = cfg.booking_link || '';
            document.getElementById('edit-tone_instructions').value = cfg.tone_instructions || '';
            document.getElementById('edit-outbound_offer').value = cfg.outbound_offer || '';
            document.getElementById('edit-services').value = JSON.stringify(cfg.services || {}, null, 2);
            document.getElementById('edit-faq').value = JSON.stringify(cfg.faq || {}, null, 2);
            document.getElementById('modal-title').textContent = `Config: ${client.business_name}`;
            document.getElementById('config-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('config-modal').classList.remove('show');
        }

        async function saveConfig(e) {
            e.preventDefault();
            const clientId = document.getElementById('edit-client-id').value;
            const body = {
                business_name: document.getElementById('edit-business_name').value,
                niche: document.getElementById('edit-niche').value,
                whatsapp_phone_number_id: document.getElementById('edit-whatsapp_phone_number_id').value || null,
                inbound_email_address: document.getElementById('edit-inbound_email_address').value || null,
                booking_link: document.getElementById('edit-booking_link').value || null,
                tone_instructions: document.getElementById('edit-tone_instructions').value || null,
                outbound_offer: document.getElementById('edit-outbound_offer').value || null,
            };
            try {
                body.services = JSON.parse(document.getElementById('edit-services').value || '{}');
                body.faq = JSON.parse(document.getElementById('edit-faq').value || '{}');
            } catch (err) {
                alert('Invalid JSON in Services or FAQ field');
                return;
            }
            try {
                await api(`/admin/clients/${clientId}/config`, { method: 'PATCH', body: JSON.stringify(body) });
                closeModal();
                loadClients();
            } catch (e) { alert('Error: ' + e.message); }
        }

        // ---------- Tab 2: Leads ----------
        let leadsClientId = '';
        let leadsStatusFilter = '';

        function renderLeadsTab() {
            const el = document.getElementById('content-leads');
            el.innerHTML = `
                <div class="flex gap-4 items-center mb-6">
                    ${clientDropdown(leadsClientId, "selectLeadsClient(this.value)")}
                    <div class="form-group" style="max-width: 200px; margin-bottom: 0;">
                        <select onchange="filterLeadsStatus(this.value)">
                            <option value="">All Statuses</option>
                            <option value="new" ${leadsStatusFilter === 'new' ? 'selected' : ''}>New</option>
                            <option value="contacted" ${leadsStatusFilter === 'contacted' ? 'selected' : ''}>Contacted</option>
                            <option value="replied" ${leadsStatusFilter === 'replied' ? 'selected' : ''}>Replied</option>
                            <option value="booked" ${leadsStatusFilter === 'booked' ? 'selected' : ''}>Booked</option>
                            <option value="dead" ${leadsStatusFilter === 'dead' ? 'selected' : ''}>Dead</option>
                        </select>
                    </div>
                </div>
                <div id="leads-content">${leadsClientId ? getLoading() : '<div class="card"><p style="color: var(--text-tertiary)">Select a client to view leads.</p></div>'}</div>
            `;
            if (leadsClientId) loadLeads();
        }

        function selectLeadsClient(id) { leadsClientId = id; leadsStatusFilter = ''; renderLeadsTab(); }
        function filterLeadsStatus(s) { leadsStatusFilter = s; loadLeads(); }

        async function loadLeads() {
            const el = document.getElementById('leads-content');
            el.innerHTML = getLoading();
            try {
                let url = `/admin/clients/${leadsClientId}/leads`;
                if (leadsStatusFilter) url += `?status_filter=${leadsStatusFilter}`;
                const data = await api(url);
                
                if (!data.leads.length) {
                    el.innerHTML = '<div class="card"><p style="color: var(--text-tertiary)">No leads found.</p></div>';
                    return;
                }

                let html = `
                <div class="mb-4">
                    <span style="color: var(--text-secondary); font-size: 0.9rem;">Total Leads: <strong style="color: #fff">${data.count}</strong></span>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>Name</th><th>Contact</th><th>Source</th><th>Status</th><th>Last Contacted</th></tr>
                        </thead>
                        <tbody>`;
                data.leads.forEach(l => {
                    const contact = l.phone || l.email || '—';
                    html += `
                        <tr>
                            <td style="font-weight: 500;">${l.name}</td>
                            <td style="color: var(--text-secondary)">${contact}</td>
                            <td>${getBadge(l.source)}</td>
                            <td>${getBadge(l.status)}</td>
                            <td style="color: var(--text-tertiary); font-size: 0.8rem;">${formatDate(l.last_contacted_at)}</td>
                        </tr>`;
                });
                html += '</tbody></table></div>';
                el.innerHTML = html;
            } catch (e) {
                el.innerHTML = `<div class="card"><p style="color: var(--accent-danger)">Error: ${e.message}</p></div>`;
            }
        }

        // ---------- Tab 3: Conversations ----------
        let convsClientId = '';
        let expandedConvId = null;

        function renderConversationsTab() {
            const el = document.getElementById('content-conversations');
            el.innerHTML = `
                <div class="mb-6">${clientDropdown(convsClientId, "selectConvsClient(this.value)")}</div>
                <div id="convs-content">${convsClientId ? getLoading() : '<div class="card"><p style="color: var(--text-tertiary)">Select a client to view conversations.</p></div>'}</div>
            `;
            if (convsClientId) loadConversations();
        }

        function selectConvsClient(id) { convsClientId = id; expandedConvId = null; renderConversationsTab(); }

        async function loadConversations() {
            const el = document.getElementById('convs-content');
            el.innerHTML = getLoading();
            try {
                const data = await api(`/admin/clients/${convsClientId}/conversations`);
                if (!data.conversations.length) {
                    el.innerHTML = '<div class="card"><p style="color: var(--text-tertiary)">No conversations found.</p></div>';
                    return;
                }

                let html = '';
                data.conversations.forEach(c => {
                    const lead = c.leads || {};
                    const lastMsg = c.last_message;
                    const isHandoff = c.status === 'handed_off';
                    
                    html += `
                    <div class="card conv-item" onclick="toggleConv('${c.id}')">
                        <div class="conv-header">
                            <div class="conv-meta">
                                <span style="font-weight: 600; font-size: 1.05rem; color: #fff;">${lead.name || '—'}</span>
                                <span style="color: var(--text-secondary); font-size: 0.85rem; margin-left: 0.5rem;">${lead.phone || lead.email || ''}</span>
                                ${getBadge(c.channel)}
                                ${getBadge(c.status)}
                            </div>
                            <span style="color: var(--text-tertiary); font-size: 0.75rem;">${lastMsg ? formatDate(lastMsg.created_at) : ''}</span>
                        </div>
                        ${lastMsg ? `<p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;" class="truncate">${getBadge(lastMsg.direction)} ${lastMsg.content}</p>` : ''}
                        
                        ${isHandoff ? `
                        <div class="handoff-banner">
                            <span style="color: #fbbf24; font-weight: 600; font-size: 0.9rem;">⚠️ Human handoff required</span>
                            <button onclick="event.stopPropagation(); closeConv('${c.id}')" class="btn btn-secondary" style="padding: 0.3rem 0.8rem;">Mark Closed</button>
                        </div>` : ''}
                    </div>
                    <div id="conv-thread-${c.id}" class="hidden thread-container"></div>`;
                });
                el.innerHTML = html;
                if (expandedConvId) loadThread(expandedConvId);
            } catch (e) {
                el.innerHTML = `<div class="card"><p style="color: var(--accent-danger)">Error: ${e.message}</p></div>`;
            }
        }

        async function toggleConv(convId) {
            const threadEl = document.getElementById('conv-thread-' + convId);
            if (expandedConvId === convId) {
                threadEl.classList.add('hidden');
                expandedConvId = null;
                return;
            }
            if (expandedConvId) {
                const prev = document.getElementById('conv-thread-' + expandedConvId);
                if (prev) prev.classList.add('hidden');
            }
            expandedConvId = convId;
            threadEl.classList.remove('hidden');
            threadEl.innerHTML = getLoading();
            await loadThread(convId);
        }

        async function loadThread(convId) {
            const el = document.getElementById('conv-thread-' + convId);
            try {
                const data = await api(`/admin/conversations/${convId}/messages`);
                let html = '';
                data.messages.forEach(m => {
                    const cls = m.direction === 'inbound' ? 'chat-inbound' : 'chat-outbound';
                    html += `
                    <div class="chat-bubble ${cls}">
                        <div class="flex justify-between items-center mb-1">
                            ${getBadge(m.direction)}
                            <span style="font-size: 0.7rem; color: var(--text-tertiary);">${formatDate(m.created_at)}</span>
                        </div>
                        <p>${m.content.replace(/\n/g, '<br>')}</p>
                    </div>`;
                });
                el.innerHTML = html;
            } catch (e) {
                el.innerHTML = `<p style="color: var(--accent-danger);">Error: ${e.message}</p>`;
            }
        }

        async function closeConv(convId) {
            try {
                await api(`/admin/conversations/${convId}/status`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: 'closed' })
                });
                loadConversations();
            } catch (e) { alert('Error: ' + e.message); }
        }

        // ---------- Tab 4: Events ----------
        let eventsClientId = '';
        let eventsTypeFilter = '';

        function renderEventsTab() {
            const el = document.getElementById('content-events');
            el.innerHTML = `
                <div class="flex gap-4 items-center mb-6">
                    ${clientDropdown(eventsClientId, "selectEventsClient(this.value)")}
                    <div class="form-group" style="max-width: 300px; margin-bottom: 0;">
                        <input type="text" placeholder="Filter type (e.g. error, webhook)" value="${eventsTypeFilter}" onchange="filterEventsType(this.value)">
                    </div>
                </div>
                <div id="events-content">${eventsClientId ? getLoading() : '<div class="card"><p style="color: var(--text-tertiary)">Select a client to view events.</p></div>'}</div>
            `;
            if (eventsClientId) loadEvents();
        }

        function selectEventsClient(id) { eventsClientId = id; eventsTypeFilter = ''; renderEventsTab(); }
        function filterEventsType(t) { eventsTypeFilter = t; loadEvents(); }

        async function loadEvents() {
            const el = document.getElementById('events-content');
            el.innerHTML = getLoading();
            try {
                let url = `/admin/clients/${eventsClientId}/events`;
                if (eventsTypeFilter) url += `?type_filter=${eventsTypeFilter}`;
                const data = await api(url);
                
                if (!data.events.length) {
                    el.innerHTML = '<div class="card"><p style="color: var(--text-tertiary)">No events found.</p></div>';
                    return;
                }

                let html = `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>Type</th><th>Payload Snapshot</th><th>Timestamp</th></tr>
                        </thead>
                        <tbody>`;
                data.events.forEach(ev => {
                    const payloadStr = JSON.stringify(ev.payload || {});
                    const preview = payloadStr.length > 150 ? payloadStr.substring(0, 150) + '…' : payloadStr;
                    html += `
                        <tr>
                            <td>${getBadge(ev.type)}</td>
                            <td style="color: var(--text-secondary); font-size: 0.8rem; font-family: monospace;">${preview}</td>
                            <td style="color: var(--text-tertiary); font-size: 0.8rem; white-space: nowrap;">${formatDate(ev.created_at)}</td>
                        </tr>`;
                });
                html += '</tbody></table></div>';
                el.innerHTML = html;
            } catch (e) {
                el.innerHTML = `<div class="card"><p style="color: var(--accent-danger)">Error: ${e.message}</p></div>`;
            }
        }

        // Init
        loadClients();
    </script>
</body>
</html>
